<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наши врачи — Медицинский центр «Здоровье»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1f6bff; --primary-600: #1556d6; --accent: #12b8a6;
      --ink: #0f172a; --muted: #64748b; --line: #e7eef7; --bg: #f4f8fd;
      --card-shadow: 0 14px 40px rgba(15, 45, 90, 0.08); --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.65; -webkit-font-smoothing: antialiased; }

    .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid rgba(15,45,90,.07); }
    .nav-inner { max-width: 1180px; margin: 0 auto; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 11px; font-weight: 800; font-size: 19px; }
    .brand .logo { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; color: #fff; font-size: 21px; background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 8px 18px rgba(31,107,255,.32); }
    .brand b { color: var(--primary); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-right a { text-decoration: none; font-weight: 700; font-size: 14px; }
    .nav-cabinet { color: var(--primary); padding: 9px 16px; border-radius: 11px; border: 1.5px solid rgba(31,107,255,.35); transition: .2s; }
    .nav-cabinet:hover { background: var(--primary); color: #fff; }
    .back-link { color: var(--muted); }
    .back-link:hover { color: var(--primary); }

    header { position: relative; overflow: hidden; color: #fff; padding: 56px 22px 64px; text-align: center;
      background: radial-gradient(700px 420px at 100% 0%, rgba(18,184,166,.5), transparent 55%), linear-gradient(135deg, #1f6bff, #2563eb 50%, #0ea5e9); }
    header::after { content: ""; position: absolute; inset: 0; opacity: .45; background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1.4px); background-size: 26px 26px; -webkit-mask-image: linear-gradient(180deg, #000, transparent 80%); mask-image: linear-gradient(180deg, #000, transparent 80%); }
    .head-in { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    header h1 { font-size: 38px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 12px; }
    header p { opacity: .95; font-size: 17px; }

    .tools { max-width: 1180px; margin: 28px auto 0; padding: 0 22px; display: flex; gap: 12px; flex-wrap: wrap; }
    .tools input, .tools select { padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; font-family: inherit; background: #fff; transition: .2s; }
    .tools input { flex: 1; min-width: 220px; }
    .tools input:focus, .tools select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(31,107,255,.12); }

    main { max-width: 1180px; margin: 24px auto 64px; padding: 0 22px; }
    .count { color: var(--muted); margin-bottom: 20px; font-weight: 600; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

    .doctor-card { background: #fff; padding: 26px; border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid var(--line);
      transition: transform .25s, box-shadow .25s; display: flex; flex-direction: column; text-decoration: none; color: inherit; cursor: pointer; }
    .doctor-card:hover { transform: translateY(-6px); box-shadow: 0 22px 50px rgba(15,45,90,.14); border-color: rgba(31,107,255,.25); }
    .doc-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .doc-avatar { width: 60px; height: 60px; flex-shrink: 0; border-radius: 16px; display: grid; place-items: center; font-size: 24px; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent)); overflow: hidden; box-shadow: 0 8px 18px rgba(31,107,255,.28); }
    .doc-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .doc-head h3 { color: var(--ink); font-size: 19px; margin-bottom: 3px; }
    .specialty { font-weight: 700; color: var(--primary); font-size: 14px; }
    .desc { color: var(--muted); flex: 1; font-size: 15px; }
    .doctor-card ul { margin: 12px 0 4px 18px; color: #475569; font-size: 14px; }
    .doc-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0 16px; }
    .meta-pill { display: inline-flex; align-items: center; gap: 6px; background: #eef5ff; color: #1e3a8a; font-weight: 700; font-size: 14px; padding: 8px 14px; border-radius: 999px; }
    .more { margin-top: auto; color: var(--primary); font-weight: 700; font-size: 15px; }
    .loading, .empty { text-align: center; color: var(--muted); padding: 50px; grid-column: 1 / -1; }

    footer { text-align: center; color: #94a3b8; font-size: 13px; padding: 28px; border-top: 1px solid var(--line); }

    @media (max-width: 600px) {
      header { padding: 40px 16px 48px; } header h1 { font-size: 28px; }
      .tools { flex-direction: column; } .cards { grid-template-columns: 1fr; gap: 16px; }
      .brand { font-size: 17px; } main { margin: 18px auto 40px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="logo">✚</span><span>Клиника <b>«Здоровье»</b></span></div>
      <div class="nav-right">
        <a class="nav-cabinet" href="cabinet.html">👤 Личный кабинет</a>
        <a class="back-link" href="index.html">← На главную</a>
      </div>
    </div>
  </nav>

  <header>
    <div class="head-in">
      <h1>Наши врачи</h1>
      <p>Выберите специалиста: посмотрите, чем он занимается, сколько стоит и сколько длится приём — и запишитесь онлайн.</p>
    </div>
  </header>

  <div class="tools">
    <input type="text" id="search" placeholder="Поиск по имени или специализации..." oninput="renderDoctors()" />
    <select id="specFilter" onchange="renderDoctors()">
      <option value="">Все направления</option>
    </select>
  </div>

  <main>
    <p class="count" id="count"></p>
    <div class="cards" id="doctorCards"><p class="loading">Загружаем врачей…</p></div>
  </main>

  <footer>© 2026 Медицинский центр «Здоровье»</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ===== Подключение к Supabase (publishable key — публичный) ===== */
    const SUPABASE_URL = "https://jntfbxunzvhnzocquvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i_LZdRnHXMYNFf608V86GA_ohVuGfAH";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let doctors = [];
    let services = [];

    async function loadData() {
      const [docRes, svcRes] = await Promise.all([
        sb.from("doctors").select("id, name, specialty, description, photo_url").order("id"),
        sb.from("services").select("specialty, name, duration_min, price").order("id"),
      ]);
      if (!docRes.error && docRes.data) {
        doctors = docRes.data.map(d => ({ id: d.id, name: d.name, spec: d.specialty, desc: d.description, photo: d.photo_url }));
      }
      if (!svcRes.error && svcRes.data) {
        services = svcRes.data.map(s => ({ spec: s.specialty, name: s.name, min: s.duration_min, price: s.price }));
      }
    }

    function fmtPrice(p) { return p.toLocaleString("ru-RU") + " ₽"; }
    function initials(name) { return (name || "?").trim().charAt(0).toUpperCase(); }
    function rangeText(min, max, suffix) {
      if (min == null) return "уточняется";
      return (min === max ? `${min}` : `${min}–${max}`) + suffix;
    }
    function doctorStats(spec) {
      const list = services.filter(s => s.spec === spec);
      const prices = list.map(s => s.price).filter(p => p != null);
      const durs = list.map(s => s.min).filter(d => d != null);
      return {
        items: [...new Set(list.map(s => s.name))],
        priceMin: prices.length ? Math.min(...prices) : null,
        priceMax: prices.length ? Math.max(...prices) : null,
        durMin: durs.length ? Math.min(...durs) : null,
        durMax: durs.length ? Math.max(...durs) : null,
      };
    }

    function fillFilter() {
      const sel = document.getElementById("specFilter");
      [...new Set(doctors.map(d => d.spec))].sort((a,b)=>a.localeCompare(b,"ru"))
        .forEach(spec => {
          const o = document.createElement("option");
          o.value = spec; o.textContent = spec; sel.appendChild(o);
        });
    }

    function renderDoctors() {
      const wrap = document.getElementById("doctorCards");
      const q = document.getElementById("search").value.trim().toLowerCase();
      const filterSpec = document.getElementById("specFilter").value;

      const list = doctors.filter(d => {
        const matchSpec = !filterSpec || d.spec === filterSpec;
        const matchText = !q || d.name.toLowerCase().includes(q) || d.spec.toLowerCase().includes(q);
        return matchSpec && matchText;
      });

      document.getElementById("count").textContent = `Найдено специалистов: ${list.length}`;

      if (!list.length) {
        wrap.innerHTML = '<p class="empty">Никого не нашли. Попробуйте изменить запрос.</p>';
        return;
      }

      wrap.innerHTML = list.map(d => {
        const st = doctorStats(d.spec);
        const priceText = st.priceMin == null ? "уточняется"
          : (st.priceMin === st.priceMax ? fmtPrice(st.priceMin) : "от " + fmtPrice(st.priceMin));
        const durText = rangeText(st.durMin, st.durMax, " мин");
        const items = st.items.slice(0, 4).map(i => `<li>${i}</li>`).join("");
        const avatar = d.photo
          ? `<div class="doc-avatar"><img src="${d.photo}" alt="${d.name}" loading="lazy"></div>`
          : `<div class="doc-avatar">${initials(d.name)}</div>`;
        return `
        <a class="doctor-card" href="doctor.html?id=${d.id}">
          <div class="doc-head">
            ${avatar}
            <div>
              <h3>${d.name}</h3>
              <p class="specialty">${d.spec}</p>
            </div>
          </div>
          <p class="desc">${d.desc || ""}</p>
          ${items ? `<ul>${items}</ul>` : ""}
          <div class="doc-meta">
            <span class="meta-pill">💳 ${priceText}</span>
            <span class="meta-pill">⏱️ ${durText}</span>
          </div>
          <span class="more">Подробнее о враче →</span>
        </a>`;
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadData();
      fillFilter();
      renderDoctors();
    });
  </script>
</body>
</html>
