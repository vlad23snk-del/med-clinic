<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="theme.css" />
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){}})();</script>
  <title>Профиль врача — Медицинский центр «Здоровье»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1f6bff; --primary-600: #1556d6; --accent: #12b8a6;
      --ink: #0f172a; --muted: #64748b; --line: #e7eef7; --bg: #f4f8fd;
      --card-shadow: 0 14px 40px rgba(15, 45, 90, 0.08); --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.65; -webkit-font-smoothing: antialiased; }

    .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid rgba(15,45,90,.07); }
    .nav-inner { max-width: 1000px; margin: 0 auto; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 11px; font-weight: 800; font-size: 19px; }
    .brand .logo { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; color: #fff; font-size: 21px; background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 8px 18px rgba(31,107,255,.32); }
    .brand b { color: var(--primary); }
    .nav-links { display: flex; gap: 18px; }
    .nav-links a { text-decoration: none; color: var(--muted); font-weight: 700; font-size: 14px; }
    .nav-links a:hover { color: var(--primary); }

    main { max-width: 1000px; margin: 28px auto 64px; padding: 0 22px; }

    .profile-head { position: relative; overflow: hidden; color: #fff; border-radius: 24px; padding: 34px; display: flex; gap: 28px; flex-wrap: wrap; align-items: center;
      background: radial-gradient(500px 300px at 100% 0%, rgba(18,184,166,.55), transparent 60%), linear-gradient(135deg, #1f6bff, #2563eb 55%, #0ea5e9); box-shadow: 0 20px 50px rgba(31,107,255,.28); }
    .photo { width: 150px; height: 150px; border-radius: 22px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,.2); border: 3px solid rgba(255,255,255,.35); }
    .profile-info { flex: 1; min-width: 240px; position: relative; z-index: 1; }
    .profile-info h1 { font-size: 32px; margin-bottom: 10px; font-weight: 800; letter-spacing: -.02em; }
    .badge { display: inline-block; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35); color: #fff; font-weight: 700; padding: 7px 16px; border-radius: 999px; font-size: 14px; }
    .profile-meta { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.28); color: #fff; font-weight: 700; font-size: 14px; padding: 8px 14px; border-radius: 999px; }
    .stars { color: #fde047; font-size: 16px; letter-spacing: 1px; }

    section.block { background: #fff; border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid var(--line); padding: 28px; margin-top: 22px; }
    section.block h2 { font-size: 22px; color: var(--ink); margin-bottom: 16px; font-weight: 800; }
    .block p.lead { color: #475569; font-size: 16px; }
    .edu { display: flex; gap: 14px; align-items: flex-start; color: #475569; }
    .edu .ico { font-size: 24px; }

    .svc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .svc-item { border: 1px solid var(--line); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }
    .svc-item:hover { transform: translateY(-3px); box-shadow: var(--card-shadow); }
    .svc-item h3 { font-size: 16px; color: var(--ink); margin-bottom: 10px; }
    .svc-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; color: var(--muted); font-size: 14px; }
    .svc-price { font-weight: 800; color: var(--ink); font-size: 17px; }
    .svc-item a.book { margin-top: auto; text-align: center; text-decoration: none; padding: 12px; color: #fff; border-radius: 12px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-600)); transition: transform .2s, box-shadow .2s; }
    .svc-item a.book:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(31,107,255,.32); }

    .reviews { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .review { border: 1px solid var(--line); border-radius: 16px; padding: 20px; background: #fbfdff; }
    .review .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .review .author { font-weight: 700; color: var(--ink); }
    .review .stars { color: #f59e0b; }
    .review p { color: #475569; }
    .note { color: var(--muted); font-size: 13px; margin-top: 14px; }
    .loading { text-align: center; color: var(--muted); padding: 60px; }

    footer { text-align: center; color: #94a3b8; font-size: 13px; padding: 28px; border-top: 1px solid var(--line); margin-top: 20px; }

    @media (max-width: 600px) {
      main { margin: 18px auto 40px; }
      .profile-head { flex-direction: column; text-align: center; padding: 24px; gap: 18px; }
      .photo { width: 130px; height: 130px; }
      .profile-info { min-width: 0; } .profile-info h1 { font-size: 26px; }
      .profile-meta { justify-content: center; }
      section.block { padding: 20px; margin-top: 16px; } section.block h2 { font-size: 20px; }
      .svc-list, .reviews { grid-template-columns: 1fr; }
      .nav-inner { gap: 8px; } .brand { font-size: 17px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="logo">✚</span><span>Клиника <b>«Здоровье»</b></span></div>
      <div class="nav-links">
        <a href="doctors.html">← К списку врачей</a>
        <a href="index.html">На главную</a>
      </div>
    </div>
  </nav>

  <main id="content">
    <p class="loading">Загружаем профиль врача…</p>
  </main>

  <footer>© 2026 Медицинский центр «Здоровье»</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jntfbxunzvhnzocquvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i_LZdRnHXMYNFf608V86GA_ohVuGfAH";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const id = new URLSearchParams(location.search).get("id");

    function fmtPrice(p) { return p == null ? "уточняется" : p.toLocaleString("ru-RU") + " ₽"; }
    function stars(r) {
      r = Math.round(r || 0);
      return "★".repeat(r) + "☆".repeat(Math.max(0, 5 - r));
    }
    function esc(s) {
      return (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    }

    async function load() {
      const content = document.getElementById("content");
      if (!id) { content.innerHTML = '<p class="loading">Врач не указан. Вернитесь к <a href="doctors.html">списку врачей</a>.</p>'; return; }

      const { data: doc, error } = await sb.from("doctors").select("*").eq("id", id).single();
      if (error || !doc) { content.innerHTML = '<p class="loading">Врач не найден. Вернитесь к <a href="doctors.html">списку врачей</a>.</p>'; return; }

      const [svcRes, revRes] = await Promise.all([
        sb.from("services").select("name, duration_min, price").eq("doctor", doc.name).order("price"),
        sb.from("reviews").select("author, rating, text").eq("doctor_id", id),
      ]);
      const services = svcRes.data || [];
      const reviews = revRes.data || [];
      const avg = reviews.length ? reviews.reduce((s, r) => s + (r.rating || 0), 0) / reviews.length : 0;

      const photo = doc.photo_url
        ? `<img class="photo" src="${doc.photo_url}" alt="${esc(doc.name)}">`
        : `<div class="photo"></div>`;

      const svcHtml = services.map(s => {
        const link = `index.html?spec=${encodeURIComponent(doc.specialty)}`
                   + `&doctor=${encodeURIComponent(doc.name)}`
                   + `&service=${encodeURIComponent(s.name)}#appointment`;
        return `
        <div class="svc-item">
          <h3>${esc(s.name)}</h3>
          <div class="svc-line">
            <span>⏱️ ${s.duration_min != null ? s.duration_min + " мин" : "—"}</span>
            <span class="svc-price">${fmtPrice(s.price)}</span>
          </div>
          <a class="book" href="${link}">Записаться</a>
        </div>`;
      }).join("");

      const revHtml = reviews.map(r => `
        <div class="review">
          <div class="top">
            <span class="author">${esc(r.author)}</span>
            <span class="stars">${stars(r.rating)}</span>
          </div>
          <p>${esc(r.text)}</p>
        </div>`).join("");

      content.innerHTML = `
        <div class="profile-head">
          ${photo}
          <div class="profile-info">
            <h1>${esc(doc.name)}</h1>
            <span class="badge">${esc(doc.specialty)}</span>
            <div class="profile-meta">
              ${doc.experience_years ? `<span class="pill">🩺 Стаж ${doc.experience_years} лет</span>` : ""}
              ${reviews.length ? `<span class="pill"><span class="stars">${stars(avg)}</span> ${avg.toFixed(1)} (${reviews.length})</span>` : ""}
            </div>
          </div>
        </div>

        <section class="block">
          <h2>О враче</h2>
          <p class="lead">${esc(doc.description)}</p>
        </section>

        <section class="block">
          <h2>Образование</h2>
          <div class="edu"><span class="ico">🎓</span><p>${esc(doc.education) || "Информация уточняется."}</p></div>
        </section>

        <section class="block">
          <h2>Услуги и запись</h2>
          ${services.length ? `<div class="svc-list">${svcHtml}</div>` : "<p>Список услуг уточняется.</p>"}
        </section>

        <section class="block">
          <h2>Отзывы пациентов</h2>
          ${reviews.length ? `<div class="reviews">${revHtml}</div>` : "<p>Пока нет отзывов.</p>"}
          <p class="note">Отзывы оставлены пациентами клиники.</p>
        </section>
      `;
      document.title = `${doc.name} — ${doc.specialty} — Клиника «Здоровье»`;
    }

    load();
  </script>
  <script src="theme.js"></script>
</body>
</html>
