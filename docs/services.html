<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Услуги и цены — Медицинский центр «Здоровье»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1f6bff; --primary-600: #1556d6; --accent: #12b8a6;
      --ink: #0f172a; --muted: #64748b; --line: #e7eef7; --bg: #f4f8fd;
      --card-shadow: 0 14px 40px rgba(15, 45, 90, 0.08); --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.65; -webkit-font-smoothing: antialiased; }

    .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid rgba(15,45,90,.07); }
    .nav-inner { max-width: 1180px; margin: 0 auto; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 11px; font-weight: 800; font-size: 19px; }
    .brand .logo { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; color: #fff; font-size: 21px; background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 8px 18px rgba(31,107,255,.32); }
    .brand b { color: var(--primary); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-right a { text-decoration: none; font-weight: 700; font-size: 14px; }
    .nav-cabinet { color: var(--primary); padding: 9px 16px; border-radius: 11px; border: 1.5px solid rgba(31,107,255,.35); transition: .2s; }
    .nav-cabinet:hover { background: var(--primary); color: #fff; }
    .back-link { color: var(--muted); }
    .back-link:hover { color: var(--primary); }

    header { position: relative; overflow: hidden; color: #fff; padding: 56px 22px 64px; text-align: center;
      background: radial-gradient(700px 420px at 100% 0%, rgba(18,184,166,.5), transparent 55%), linear-gradient(135deg, #1f6bff, #2563eb 50%, #0ea5e9); }
    header::after { content: ""; position: absolute; inset: 0; opacity: .45; background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1.4px); background-size: 26px 26px; -webkit-mask-image: linear-gradient(180deg, #000, transparent 80%); mask-image: linear-gradient(180deg, #000, transparent 80%); }
    .head-in { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
    header h1 { font-size: 38px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 12px; }
    header p { opacity: .95; font-size: 17px; }

    .tools { max-width: 1180px; margin: 28px auto 0; padding: 0 22px; display: flex; gap: 12px; flex-wrap: wrap; }
    .tools input, .tools select { padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; font-family: inherit; background: #fff; transition: .2s; }
    .tools input { flex: 1; min-width: 220px; }
    .tools input:focus, .tools select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(31,107,255,.12); }

    main { max-width: 1180px; margin: 24px auto 64px; padding: 0 22px; }
    .count { color: var(--muted); margin-bottom: 20px; font-weight: 600; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; }

    .service-card { background: #fff; padding: 24px; border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid var(--line);
      display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }
    .service-card:hover { transform: translateY(-5px); box-shadow: 0 20px 46px rgba(15,45,90,.14); border-color: rgba(31,107,255,.25); }
    .svc-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .svc-spec { font-weight: 700; font-size: 13px; padding: 6px 13px; border-radius: 999px; background: linear-gradient(135deg, rgba(31,107,255,.12), rgba(18,184,166,.14)); color: var(--primary-600); }
    .svc-price { font-weight: 800; font-size: 19px; color: var(--ink); white-space: nowrap; }
    .service-card h3 { font-size: 18px; color: var(--ink); margin-bottom: 6px; }
    .svc-doctor { color: var(--muted); font-size: 14px; }
    .svc-meta { margin: 12px 0 16px; }
    .meta-pill { display: inline-flex; align-items: center; gap: 6px; background: #eef5ff; color: #1e3a8a; font-weight: 700; font-size: 14px; padding: 7px 13px; border-radius: 999px; }
    .service-card a.book { margin-top: auto; text-align: center; text-decoration: none; padding: 13px; color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-600)); transition: transform .2s, box-shadow .2s; }
    .service-card a.book:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(31,107,255,.34); }
    .loading, .empty { text-align: center; color: var(--muted); padding: 50px; grid-column: 1 / -1; }

    footer { text-align: center; color: #94a3b8; font-size: 13px; padding: 28px; border-top: 1px solid var(--line); }

    @media (max-width: 600px) {
      header { padding: 40px 16px 48px; } header h1 { font-size: 28px; }
      .tools { flex-direction: column; } .cards { grid-template-columns: 1fr; gap: 16px; }
      .brand { font-size: 17px; } main { margin: 18px auto 40px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="logo">✚</span><span>Клиника <b>«Здоровье»</b></span></div>
      <div class="nav-right">
        <a class="nav-cabinet" href="cabinet.html">👤 Личный кабинет</a>
        <a class="back-link" href="index.html">← На главную</a>
      </div>
    </div>
  </nav>

  <header>
    <div class="head-in">
      <h1>Услуги и цены</h1>
      <p>Полный перечень услуг клиники: что входит, к какому врачу, сколько длится и сколько стоит. Найдите нужную услугу и запишитесь онлайн.</p>
    </div>
  </header>

  <div class="tools">
    <input type="text" id="search" placeholder="Поиск услуги, направления или врача..." oninput="renderServices()" />
    <select id="specFilter" onchange="renderServices()">
      <option value="">Все направления</option>
    </select>
  </div>

  <main>
    <p class="count" id="count"></p>
    <div class="cards" id="serviceCards"><p class="loading">Загружаем услуги…</p></div>
  </main>

  <footer>© 2026 Медицинский центр «Здоровье»</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jntfbxunzvhnzocquvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i_LZdRnHXMYNFf608V86GA_ohVuGfAH";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let services = [];

    async function loadServices() {
      const { data, error } = await sb
        .from("services")
        .select("specialty, name, doctor, duration_min, price")
        .order("specialty");
      if (!error && data) {
        services = data.map(s => ({ spec: s.specialty, name: s.name, doctor: s.doctor, min: s.duration_min, price: s.price }));
      }
    }

    function fmtPrice(p) { return p == null ? "уточняется" : p.toLocaleString("ru-RU") + " ₽"; }

    function fillFilter() {
      const sel = document.getElementById("specFilter");
      [...new Set(services.map(s => s.spec))].sort((a,b)=>a.localeCompare(b,"ru"))
        .forEach(spec => {
          const o = document.createElement("option");
          o.value = spec; o.textContent = spec; sel.appendChild(o);
        });
    }

    function renderServices() {
      const wrap = document.getElementById("serviceCards");
      const q = document.getElementById("search").value.trim().toLowerCase();
      const filterSpec = document.getElementById("specFilter").value;

      const list = services.filter(s => {
        const matchSpec = !filterSpec || s.spec === filterSpec;
        const matchText = !q || s.name.toLowerCase().includes(q) || s.spec.toLowerCase().includes(q) || (s.doctor || "").toLowerCase().includes(q);
        return matchSpec && matchText;
      });

      document.getElementById("count").textContent = `Найдено услуг: ${list.length}`;

      if (!list.length) {
        wrap.innerHTML = '<p class="empty">Ничего не найдено. Попробуйте изменить запрос.</p>';
        return;
      }

      wrap.innerHTML = list.map(s => {
        const doctor = s.doctor && s.doctor !== "—" ? `<p class="svc-doctor">👨‍⚕️ ${s.doctor}</p>` : "";
        const dur = s.min != null ? `<div class="svc-meta"><span class="meta-pill">⏱️ ${s.min} мин</span></div>` : "";
        const link = `index.html?spec=${encodeURIComponent(s.spec)}#appointment`;
        return `
        <div class="service-card">
          <div class="svc-top">
            <span class="svc-spec">${s.spec}</span>
            <span class="svc-price">${fmtPrice(s.price)}</span>
          </div>
          <h3>${s.name}</h3>
          ${doctor}
          ${dur}
          <a class="book" href="${link}">Записаться</a>
        </div>`;
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadServices();
      fillFilter();
      renderServices();
    });
  </script>
</body>
</html>
