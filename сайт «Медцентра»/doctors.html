<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наши врачи — Медицинский центр «Здоровье»</title>
  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --cyan: #0ea5e9;
      --ink: #1f2937;
      --muted: #6b7280;
      --bg: #f4f7fb;
      --card-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    /* ---- Navbar ---- */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; color: var(--blue); }
    .brand .logo {
      width: 36px; height: 36px; display: grid; place-items: center; border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #fff; font-size: 20px;
    }
    .back-link { text-decoration: none; color: var(--blue); font-weight: 600; }
    .back-link:hover { text-decoration: underline; }

    /* ---- Header ---- */
    header {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff; padding: 44px 20px; text-align: center;
    }
    header h1 { font-size: 32px; margin-bottom: 10px; }
    header p { opacity: 0.95; max-width: 640px; margin: 0 auto; }

    /* ---- Filter bar ---- */
    .tools {
      max-width: 1200px; margin: 26px auto 0; padding: 0 20px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .tools input, .tools select {
      padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none;
    }
    .tools input { flex: 1; min-width: 220px; }
    .tools input:focus, .tools select:focus { border-color: var(--blue); }

    /* ---- Cards ---- */
    main { max-width: 1200px; margin: 24px auto 60px; padding: 0 20px; }
    .count { color: var(--muted); margin-bottom: 18px; }
    .cards {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 24px;
    }
    .doctor-card {
      background: #fff; padding: 24px; border-radius: 18px; box-shadow: var(--card-shadow);
      transition: transform .25s, box-shadow .25s; display: flex; flex-direction: column;
      text-decoration: none; color: inherit; cursor: pointer;
    }
    .doctor-card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(15,23,42,.14); }

    .doc-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .doc-avatar {
      width: 56px; height: 56px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center;
      font-size: 22px; font-weight: 800; color: #fff; background: linear-gradient(135deg, var(--cyan), var(--blue));
      overflow: hidden;
    }
    .doc-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .more { margin-top: auto; color: var(--blue); font-weight: 700; font-size: 15px; }
    .doc-head h3 { color: var(--blue); font-size: 20px; margin-bottom: 2px; }
    .specialty { font-weight: 700; color: #111827; }
    .desc { color: #374151; flex: 1; }
    .doctor-card ul { margin: 12px 0 4px 20px; color: #374151; }

    .doc-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0 18px; }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 6px; background: #f0f7ff; color: #1e3a8a;
      font-weight: 700; font-size: 14px; padding: 8px 14px; border-radius: 999px;
    }
    .doctor-card a.book {
      text-align: center; text-decoration: none; padding: 13px; background: var(--blue); color: #fff;
      border-radius: 10px; font-size: 15px; font-weight: 600; transition: background .2s;
    }
    .doctor-card a.book:hover { background: var(--blue-dark); }
    .loading, .empty { text-align: center; color: var(--muted); padding: 40px; grid-column: 1 / -1; }

    /* ---- Телефон ---- */
    @media (max-width: 600px) {
      header { padding: 32px 16px; }
      header h1 { font-size: 24px; }
      .tools { flex-direction: column; }
      .cards { grid-template-columns: 1fr; gap: 16px; }
      .brand { font-size: 17px; }
      main { margin: 18px auto 40px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="logo">✚</span><span>Клиника «Здоровье»</span></div>
      <a class="back-link" href="index.html">← На главную</a>
    </div>
  </nav>

  <header>
    <h1>Наши врачи</h1>
    <p>Выберите специалиста: посмотрите, чем он занимается, сколько стоит и сколько длится приём — и запишитесь онлайн.</p>
  </header>

  <div class="tools">
    <input type="text" id="search" placeholder="Поиск по имени или специализации..." oninput="renderDoctors()" />
    <select id="specFilter" onchange="renderDoctors()">
      <option value="">Все направления</option>
    </select>
  </div>

  <main>
    <p class="count" id="count"></p>
    <div class="cards" id="doctorCards"><p class="loading">Загружаем врачей…</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ===== Подключение к Supabase (publishable key — публичный) ===== */
    const SUPABASE_URL = "https://jntfbxunzvhnzocquvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i_LZdRnHXMYNFf608V86GA_ohVuGfAH";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let doctors = [];
    let services = [];

    async function loadData() {
      const [docRes, svcRes] = await Promise.all([
        sb.from("doctors").select("id, name, specialty, description, photo_url").order("id"),
        sb.from("services").select("specialty, name, duration_min, price").order("id"),
      ]);
      if (!docRes.error && docRes.data) {
        doctors = docRes.data.map(d => ({ id: d.id, name: d.name, spec: d.specialty, desc: d.description, photo: d.photo_url }));
      }
      if (!svcRes.error && svcRes.data) {
        services = svcRes.data.map(s => ({ spec: s.specialty, name: s.name, min: s.duration_min, price: s.price }));
      }
    }

    function fmtPrice(p) { return p.toLocaleString("ru-RU") + " ₽"; }
    function initials(name) { return (name || "?").trim().charAt(0).toUpperCase(); }
    function rangeText(min, max, suffix) {
      if (min == null) return "уточняется";
      return (min === max ? `${min}` : `${min}–${max}`) + suffix;
    }
    function doctorStats(spec) {
      const list = services.filter(s => s.spec === spec);
      const prices = list.map(s => s.price).filter(p => p != null);
      const durs = list.map(s => s.min).filter(d => d != null);
      return {
        items: [...new Set(list.map(s => s.name))],
        priceMin: prices.length ? Math.min(...prices) : null,
        priceMax: prices.length ? Math.max(...prices) : null,
        durMin: durs.length ? Math.min(...durs) : null,
        durMax: durs.length ? Math.max(...durs) : null,
      };
    }

    function fillFilter() {
      const sel = document.getElementById("specFilter");
      [...new Set(doctors.map(d => d.spec))].sort((a,b)=>a.localeCompare(b,"ru"))
        .forEach(spec => {
          const o = document.createElement("option");
          o.value = spec; o.textContent = spec; sel.appendChild(o);
        });
    }

    function renderDoctors() {
      const wrap = document.getElementById("doctorCards");
      const q = document.getElementById("search").value.trim().toLowerCase();
      const filterSpec = document.getElementById("specFilter").value;

      const list = doctors.filter(d => {
        const matchSpec = !filterSpec || d.spec === filterSpec;
        const matchText = !q || d.name.toLowerCase().includes(q) || d.spec.toLowerCase().includes(q);
        return matchSpec && matchText;
      });

      document.getElementById("count").textContent = `Найдено специалистов: ${list.length}`;

      if (!list.length) {
        wrap.innerHTML = '<p class="empty">Никого не нашли. Попробуйте изменить запрос.</p>';
        return;
      }

      wrap.innerHTML = list.map(d => {
        const st = doctorStats(d.spec);
        const priceText = st.priceMin == null ? "уточняется"
          : (st.priceMin === st.priceMax ? fmtPrice(st.priceMin) : "от " + fmtPrice(st.priceMin));
        const durText = rangeText(st.durMin, st.durMax, " мин");
        const items = st.items.slice(0, 4).map(i => `<li>${i}</li>`).join("");
        const avatar = d.photo
          ? `<div class="doc-avatar"><img src="${d.photo}" alt="${d.name}" loading="lazy"></div>`
          : `<div class="doc-avatar">${initials(d.name)}</div>`;
        return `
        <a class="doctor-card" href="doctor.html?id=${d.id}">
          <div class="doc-head">
            ${avatar}
            <div>
              <h3>${d.name}</h3>
              <p class="specialty">${d.spec}</p>
            </div>
          </div>
          <p class="desc">${d.desc || ""}</p>
          ${items ? `<ul>${items}</ul>` : ""}
          <div class="doc-meta">
            <span class="meta-pill">💳 ${priceText}</span>
            <span class="meta-pill">⏱️ ${durText}</span>
          </div>
          <span class="more">Подробнее о враче →</span>
        </a>`;
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadData();
      fillFilter();
      renderDoctors();
    });
  </script>
</body>
</html>
