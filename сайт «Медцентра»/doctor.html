<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль врача — Медицинский центр «Здоровье»</title>
  <style>
    :root {
      --blue: #2563eb; --blue-dark: #1d4ed8; --cyan: #0ea5e9;
      --ink: #1f2937; --muted: #6b7280; --bg: #f4f7fb;
      --card-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; }
    .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; }
    .nav-inner { max-width: 1000px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; color: var(--blue); }
    .brand .logo { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 10px; background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #fff; font-size: 20px; }
    .back-link { text-decoration: none; color: var(--blue); font-weight: 600; }
    .back-link:hover { text-decoration: underline; }

    main { max-width: 1000px; margin: 28px auto 60px; padding: 0 20px; }

    /* Шапка профиля */
    .profile-head {
      background: #fff; border-radius: 20px; box-shadow: var(--card-shadow);
      padding: 30px; display: flex; gap: 28px; flex-wrap: wrap; align-items: center;
    }
    .photo {
      width: 150px; height: 150px; border-radius: 20px; object-fit: cover; flex-shrink: 0;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
    }
    .profile-info { flex: 1; min-width: 240px; }
    .profile-info h1 { font-size: 30px; color: #111827; margin-bottom: 6px; }
    .badge { display: inline-block; background: #e0f2fe; color: #0369a1; font-weight: 700; padding: 6px 14px; border-radius: 999px; font-size: 14px; }
    .profile-meta { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; background: #f0f7ff; color: #1e3a8a; font-weight: 700; font-size: 14px; padding: 8px 14px; border-radius: 999px; }
    .stars { color: #f59e0b; font-size: 16px; letter-spacing: 1px; }

    section.block { background: #fff; border-radius: 18px; box-shadow: var(--card-shadow); padding: 26px; margin-top: 24px; }
    section.block h2 { font-size: 22px; color: #111827; margin-bottom: 14px; }
    .block p.lead { color: #374151; }
    .edu { display: flex; gap: 12px; align-items: flex-start; color: #374151; }
    .edu .ico { font-size: 22px; }

    /* Услуги */
    .svc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .svc-item { border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; display: flex; flex-direction: column; }
    .svc-item h3 { font-size: 16px; color: #111827; margin-bottom: 8px; }
    .svc-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--muted); font-size: 14px; }
    .svc-price { font-weight: 800; color: #1e3a8a; font-size: 17px; }
    .svc-item a.book { margin-top: auto; text-align: center; text-decoration: none; padding: 11px; background: var(--blue); color: #fff; border-radius: 10px; font-weight: 600; transition: background .2s; }
    .svc-item a.book:hover { background: var(--blue-dark); }

    /* Отзывы */
    .reviews { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .review { border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    .review .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .review .author { font-weight: 700; color: #111827; }
    .review p { color: #374151; }
    .note { color: var(--muted); font-size: 13px; margin-top: 12px; }
    .loading { text-align: center; color: var(--muted); padding: 60px; }

    /* ---- Телефон ---- */
    @media (max-width: 600px) {
      main { margin: 18px auto 40px; }
      .profile-head { flex-direction: column; text-align: center; padding: 22px; gap: 18px; }
      .photo { width: 130px; height: 130px; }
      .profile-info { min-width: 0; }
      .profile-info h1 { font-size: 24px; }
      .profile-meta { justify-content: center; }
      section.block { padding: 20px; margin-top: 16px; }
      section.block h2 { font-size: 20px; }
      .svc-list, .reviews { grid-template-columns: 1fr; }
      .nav-inner { gap: 8px; }
      .brand { font-size: 17px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="logo">✚</span><span>Клиника «Здоровье»</span></div>
      <div style="display:flex; gap:18px;">
        <a class="back-link" href="doctors.html">← К списку врачей</a>
        <a class="back-link" href="index.html">На главную</a>
      </div>
    </div>
  </nav>

  <main id="content">
    <p class="loading">Загружаем профиль врача…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jntfbxunzvhnzocquvby.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i_LZdRnHXMYNFf608V86GA_ohVuGfAH";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const id = new URLSearchParams(location.search).get("id");

    function fmtPrice(p) { return p == null ? "уточняется" : p.toLocaleString("ru-RU") + " ₽"; }
    function stars(r) {
      r = Math.round(r || 0);
      return "★".repeat(r) + "☆".repeat(Math.max(0, 5 - r));
    }
    function esc(s) {
      return (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    }

    async function load() {
      const content = document.getElementById("content");
      if (!id) { content.innerHTML = '<p class="loading">Врач не указан. Вернитесь к <a href="doctors.html">списку врачей</a>.</p>'; return; }

      const { data: doc, error } = await sb.from("doctors").select("*").eq("id", id).single();
      if (error || !doc) { content.innerHTML = '<p class="loading">Врач не найден. Вернитесь к <a href="doctors.html">списку врачей</a>.</p>'; return; }

      const [svcRes, revRes] = await Promise.all([
        sb.from("services").select("name, duration_min, price").eq("doctor", doc.name).order("price"),
        sb.from("reviews").select("author, rating, text").eq("doctor_id", id),
      ]);
      const services = svcRes.data || [];
      const reviews = revRes.data || [];
      const avg = reviews.length ? reviews.reduce((s, r) => s + (r.rating || 0), 0) / reviews.length : 0;

      const photo = doc.photo_url
        ? `<img class="photo" src="${doc.photo_url}" alt="${esc(doc.name)}">`
        : `<div class="photo"></div>`;

      const svcHtml = services.map(s => {
        const link = `index.html?spec=${encodeURIComponent(doc.specialty)}`
                   + `&doctor=${encodeURIComponent(doc.name)}`
                   + `&service=${encodeURIComponent(s.name)}#appointment`;
        return `
        <div class="svc-item">
          <h3>${esc(s.name)}</h3>
          <div class="svc-line">
            <span>⏱️ ${s.duration_min != null ? s.duration_min + " мин" : "—"}</span>
            <span class="svc-price">${fmtPrice(s.price)}</span>
          </div>
          <a class="book" href="${link}">Записаться</a>
        </div>`;
      }).join("");

      const revHtml = reviews.map(r => `
        <div class="review">
          <div class="top">
            <span class="author">${esc(r.author)}</span>
            <span class="stars">${stars(r.rating)}</span>
          </div>
          <p>${esc(r.text)}</p>
        </div>`).join("");

      content.innerHTML = `
        <div class="profile-head">
          ${photo}
          <div class="profile-info">
            <h1>${esc(doc.name)}</h1>
            <span class="badge">${esc(doc.specialty)}</span>
            <div class="profile-meta">
              ${doc.experience_years ? `<span class="pill">🩺 Стаж ${doc.experience_years} лет</span>` : ""}
              ${reviews.length ? `<span class="pill"><span class="stars">${stars(avg)}</span> ${avg.toFixed(1)} (${reviews.length})</span>` : ""}
            </div>
          </div>
        </div>

        <section class="block">
          <h2>О враче</h2>
          <p class="lead">${esc(doc.description)}</p>
        </section>

        <section class="block">
          <h2>Образование</h2>
          <div class="edu"><span class="ico">🎓</span><p>${esc(doc.education) || "Информация уточняется."}</p></div>
        </section>

        <section class="block">
          <h2>Услуги и запись</h2>
          ${services.length ? `<div class="svc-list">${svcHtml}</div>` : "<p>Список услуг уточняется.</p>"}
        </section>

        <section class="block">
          <h2>Отзывы пациентов</h2>
          ${reviews.length ? `<div class="reviews">${revHtml}</div>` : "<p>Пока нет отзывов.</p>"}
          <p class="note">Отзывы оставлены пациентами клиники.</p>
        </section>
      `;
      document.title = `${doc.name} — ${doc.specialty} — Клиника «Здоровье»`;
    }

    load();
  </script>
</body>
</html>
